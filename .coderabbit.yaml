# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!bin/**"
    - "!pnpm-lock.yaml"
    - "!**/*.generated.*"
  path_instructions:
    - path: "src/tools/composite/**"
      instructions: "Review for MCP composite tool patterns: withErrorHandling wrapper, formatError/formatSuccess responses, Zod v4 schema validation."
    - path: "src/godot/**"
      instructions: "Review for Godot Engine integration: safe child_process execution, timeout handling, headless mode compatibility."

chat:
  auto_reply: true
